# This is a TEMPLATE. Do not commit real API keys.
# Create this secret manually using the commands in the README.
#
# oc create secret generic openviking-config \
#   --from-literal=anthropic-key='sk-ant-YOUR-KEY' \
#   -n openviking
#
# Then create the full ov.conf secret (see README for the script).
apiVersion: v1
kind: Secret
metadata:
  name: openviking-ov-conf
  namespace: openviking
type: Opaque
stringData:
  ov.conf: |
    {
      "embedding": {
        "dense": {
          "provider": "openai",
          "api_key": "ollama",
          "api_base": "http://ollama.openviking.svc.cluster.local:11434/v1",
          "model": "nomic-embed-text",
          "dimension": 768
        },
        "max_concurrent": 10
      },
      "vlm": {
        "provider": "litellm",
        "api_key": "REPLACE_WITH_YOUR_ANTHROPIC_API_KEY",
        "model": "claude-sonnet-4-6",
        "max_concurrent": 10
      },
      "storage": {
        "workspace": "/app/data",
        "agfs": { "backend": "local" },
        "vectordb": { "backend": "local" }
      },
      "server": {
        "host": "0.0.0.0",
        "port": 1933,
        "root_api_key": "REPLACE_WITH_A_STRONG_ROOT_KEY",
        "cors_origins": ["*"]
      }
    }
