# This is a TEMPLATE. Do not commit real API keys or routes.
#
# Before deploying, replace the placeholder values below:
#   - REPLACE_WITH_EMBEDDING_ROUTE: your embedding InferenceService route
#     (e.g., https://qwen3-embedding-openviking-models.apps.your-cluster.com)
#   - REPLACE_WITH_VLM_ROUTE: your VLM InferenceService route
#     (e.g., https://qwen3-32b-openviking-models.apps.your-cluster.com)
#   - REPLACE_WITH_A_STRONG_ROOT_KEY: generate with `openssl rand -hex 16`
apiVersion: v1
kind: Secret
metadata:
  name: openviking-ov-conf
  namespace: openviking
type: Opaque
stringData:
  ov.conf: |
    {
      "embedding": {
        "dense": {
          "provider": "openai",
          "api_key": "not-needed",
          "api_base": "REPLACE_WITH_EMBEDDING_ROUTE/v1",
          "model": "qwen3-embedding",
          "dimension": 1024
        },
        "max_concurrent": 10
      },
      "vlm": {
        "provider": "openai",
        "api_key": "not-needed",
        "api_base": "REPLACE_WITH_VLM_ROUTE/v1",
        "model": "qwen3-32b",
        "max_concurrent": 10
      },
      "storage": {
        "workspace": "/app/data",
        "agfs": { "backend": "local" },
        "vectordb": { "backend": "local" }
      },
      "server": {
        "host": "0.0.0.0",
        "port": 1933,
        "root_api_key": "REPLACE_WITH_A_STRONG_ROOT_KEY",
        "cors_origins": ["*"]
      }
    }
