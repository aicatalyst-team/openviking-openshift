apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: openviking
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ollama
          image: docker.io/ollama/ollama:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 11434
              protocol: TCP
          env:
            - name: HOME
              value: /tmp
            - name: OLLAMA_MODELS
              value: /data/models
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_TMPDIR
              value: /tmp
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ollama-data
        - name: tmp
          emptyDir: {}
