apiVersion: apps/v1
kind: Deployment
metadata:
  name: openviking
  namespace: openviking
  labels:
    app: openviking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openviking
  template:
    metadata:
      labels:
        app: openviking
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: openviking
          image: quay.io/aicatalyst/openviking:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 1933
              protocol: TCP
          env:
            - name: OPENVIKING_CONFIG_FILE
              value: /etc/openviking/ov.conf
            - name: HOME
              value: /tmp
          volumeMounts:
            - name: config
              mountPath: /etc/openviking
              readOnly: true
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 1933
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 1933
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
      volumes:
        - name: config
          secret:
            secretName: openviking-ov-conf
        - name: data
          persistentVolumeClaim:
            claimName: openviking-data
        - name: tmp
          emptyDir: {}
